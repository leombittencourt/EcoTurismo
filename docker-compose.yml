version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoturismo-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # Database
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}

      # JWT Settings
      - JwtSettings__Key=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=EcoTurismoApi
      - JwtSettings__Audience=EcoTurismoApp
      - JwtSettings__ExpirationMinutes=60

      # API Keys (adicione quantas chaves precisar)
      - ApiKeys__ValidKeys__0=${API_KEY_WEB}
      - ApiKeys__ValidKeys__1=${API_KEY_MOBILE}

      # File Storage
      - FileStorage__UploadsFolder=uploads

      # Logging
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Warning

    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
